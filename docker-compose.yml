services:
  mysql:
    image: mysql:8.0
    container_name: banking-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root@123
      MYSQL_DATABASE: banking_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build: .
    container_name: banking-app
    restart: always
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "5000:5000"

volumes:
  mysql-data:
